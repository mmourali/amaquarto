title: AMA Journal Format
author: amaquarto
version: 0.3.0
quarto-required: ">=1.4.0"
contributes:
  formats:
    common:
      csl: american-marketing-association.csl
      number-sections: false
      filters:
        - amaquarto.lua
    pdf:
      pdf-engine: pdflatex
      documentclass: article
      papersize: letter
      indent: true
      include-in-header:
        - ama-header.tex
      template-partials:
        - partials/doc-class.tex
        - partials/title.tex
        - partials/before-body.tex
        - partials/before-bib.tex
      keep-tex: false
      fig-pos: "H"
      tbl-cap-location: top
      fig-cap-location: bottom
      link-citations: true
      colorlinks: true
      urlcolor: "black"
      linkcolor: "black"
      citecolor: "black"
    docx:
      reference-doc: ama-reference.docx
      format-resources:
        - ama-reference.docx
      tbl-cap-location: top
      fig-cap-location: bottom
      link-citations: true
